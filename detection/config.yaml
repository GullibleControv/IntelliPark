# IntelliPark Detection Configuration

# YOLO Model Settings
model_path: models/yolo11s.pt
confidence: 0.5

# Video Processing
skip_frames: 2
resize_factor: 0.7

# Video Slowdown (for timelapse videos)
# 1.0 = normal speed
# 0.5 = 2x slower
# 0.25 = 4x slower (recommended for timelapse)
# 0.1 = 10x slower
playback_speed: 1.0

# Maximum video duration to download (for testing with long videos)
# Format: "MM:SS" e.g., "2:00" for 2 minutes
# Comment out or set to null for full video
max_video_duration: "2:00"

# Directory to cache downloaded/processed videos
video_cache_dir: video_cache

# API Connection
api_url: http://localhost:5000

# Vehicle Detection Classes (COCO dataset)
# 2 = car, 5 = bus, 7 = truck, 3 = motorcycle
vehicle_classes:
  - 2  # car
  - 3  # motorcycle
  - 5  # bus
  - 7  # truck

# Logging
log_level: INFO
