# IntelliPark Docker Compose Configuration
# Use: docker-compose up --build


services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: intellipark-db
    environment:
      POSTGRES_USER: intellipark
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: intellipark
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intellipark"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Flask Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intellipark-backend
    environment:
      - DATABASE_URL=postgresql://intellipark:${DB_PASSWORD}@db:5432/intellipark
      - SECRET_KEY=${SECRET_KEY}
      - JWT_EXPIRATION_HOURS=24
      - CORS_ORIGINS=http://localhost:8080,http://localhost:3000
      - FLASK_ENV=${FLASK_ENV:-production}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Nginx for Frontend Static Files
  frontend:
    image: nginx:alpine
    container_name: intellipark-frontend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
