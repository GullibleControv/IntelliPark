# =================================================================
# PRODUCTION Docker Compose for IntelliPark
# =================================================================

services:
  db:
    image: postgres:15-alpine
    container_name: intellipark-db-prod
    environment:
      POSTGRES_USER: ${DB_USER:-intellipark}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-intellipark}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-intellipark}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intellipark-backend-prod
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-intellipark}:${DB_PASSWORD}@db:5432/${DB_NAME:-intellipark}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_EXPIRATION_HOURS=24
      - CORS_ORIGINS=${CORS_ORIGINS}
      - FLASK_ENV=production
    expose:
      - "5000"
    depends_on:
      db:
        condition: service_healthy
    restart: always

  nginx:
    image: nginx:alpine
    container_name: intellipark-nginx-prod
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: always

  certbot:
    image: certbot/certbot
    container_name: intellipark-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
