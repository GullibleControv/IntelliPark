# Railway/Nixpacks build configuration for IntelliPark

[phases.setup]
# Include system libraries needed for opencv-python-headless
nixPkgs = ["python311", "postgresql", "libGL", "glib"]

[phases.install]
cmds = ["pip install --upgrade pip", "pip install -r requirements.txt"]

[start]
cmd = "gunicorn -w 4 -b 0.0.0.0:$PORT 'app:create_app()'"
