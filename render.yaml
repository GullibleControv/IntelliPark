# =================================================================
# Render Blueprint - IntelliPark
# =================================================================

databases:
  # PostgreSQL Database (Free tier)
  - name: intellipark-db
    databaseName: intellipark
    user: intellipark
    plan: free

services:
  # Flask Backend API
  - type: web
    name: intellipark-api
    plan: free
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: "production"
      - key: JWT_EXPIRATION_HOURS
        value: "24"
      - key: CORS_ORIGINS
        value: "https://intellipark-frontend.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: intellipark-db
          property: connectionString

  # Static Frontend (Nginx)
  - type: web
    name: intellipark-frontend
    plan: free
    runtime: static
    buildCommand: echo "No build needed"
    staticPublishPath: ./frontend
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=86400
    routes:
      - type: rewrite
        source: /api/*
        destination: https://intellipark-api.onrender.com/api/*
