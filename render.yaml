# =================================================================
# Render Blueprint - IntelliPark
# Single service deployment (API + Frontend)
# =================================================================

databases:
  # PostgreSQL Database (Free tier)
  - name: intellipark-db
    databaseName: intellipark
    user: intellipark
    plan: free
    region: oregon

services:
  # Combined Flask API + Static Frontend
  - type: web
    name: intellipark
    plan: free
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 "app:create_app()"
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: RENDER
        value: "true"
      - key: ADMIN_EMAIL
        value: admin@intellipark.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: intellipark-db
          property: connectionString
